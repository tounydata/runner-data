name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare stable frontend
        run: |
          mkdir -p .pages
          cp index.html .pages/index.html
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.pages/index.html')
          html = path.read_text()
          patch = r'''
<script>
(function(){
  function parseStoredGpx(raw) {
    if (!raw) return null;
    if (Array.isArray(raw)) return raw;
    if (typeof raw === 'string') {
      try {
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : null;
      } catch (_) {
        return null;
      }
    }
    return null;
  }

  window.prepareRace = async function(race) {
    try {
      let freshRace = race;

      if (window.sb && race && race.id) {
        const { data, error } = await window.sb
          .from('race_calendar')
          .select('*')
          .eq('id', race.id)
          .maybeSingle();
        if (!error && data) freshRace = data;
      }

      showPanel('strategie', document.querySelector('.nbtn[onclick*=\"strategie\"]'));

      const stratResult = document.getElementById('stratResult');
      const gpxDrop = document.getElementById('gpxDrop');
      if (stratResult) {
        stratResult.style.display = 'none';
        stratResult.innerHTML = '';
      }
      if (gpxDrop) gpxDrop.style.display = 'block';

      currentRaceContext = freshRace;
      window.currentRaceContext = freshRace;

      const points = parseStoredGpx(freshRace && freshRace.gpx_data);
      if (points && points.length) {
        await analyzeGPX(points, freshRace.name || 'Course');
        currentRaceContext = freshRace;
        window.currentRaceContext = freshRace;
        return;
      }

      showGpxUploadPrompt(freshRace);
    } catch (err) {
      console.error('prepareRace patch failed', err);
      currentRaceContext = race;
      window.currentRaceContext = race;
      showGpxUploadPrompt(race);
    }
  };

  window.parseGPX = function(file, raceCtx) {
    if (raceCtx) {
      currentRaceContext = raceCtx;
      window.currentRaceContext = raceCtx;
    }

    const reader = new FileReader();
    reader.onload = async e => {
      const xml = new DOMParser().parseFromString(e.target.result, 'text/xml');
      const pts = xml.querySelectorAll('trkpt');
      if (!pts.length) {
        alert('GPX invalide ou vide');
        return;
      }

      const points = [];
      pts.forEach(pt => {
        const lat = parseFloat(pt.getAttribute('lat'));
        const lon = parseFloat(pt.getAttribute('lon'));
        const ele = pt.querySelector('ele');
        points.push({ lat, lon, ele: ele ? parseFloat(ele.textContent) : null });
      });

      window._pendingGpxSave = points;
      await analyzeGPX(points, file.name || '');
    };
    reader.readAsText(file);
  };

  window.handleGpxFile = function(e) {
    const f = e.target.files && e.target.files[0];
    if (f) window.parseGPX(f, currentRaceContext || window.currentRaceContext || null);
  };

  window.handleGpxDrop = function(e) {
    e.preventDefault();
    const drop = document.getElementById('gpxDrop');
    if (drop) drop.classList.remove('drag');
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    if (f && f.name.toLowerCase().endsWith('.gpx')) {
      window.parseGPX(f, currentRaceContext || window.currentRaceContext || null);
    }
  };
})();
</script>
'''
          html = html.replace('</body>', patch + '\n</body>')
          path.write_text(html)
          Path('.pages/404.html').write_text(html)
          PY
          touch .pages/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .pages
      - id: deployment
        uses: actions/deploy-pages@v4
