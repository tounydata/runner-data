<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Runner Data Pro</title>

<style>
body{margin:0;font-family:-apple-system,system-ui;background:#0b0f1a;color:white;padding:20px;padding-bottom:90px}
.card{background:#111827;border-radius:14px;padding:18px;margin:14px 0}
.title{font-size:22px;font-weight:700;margin-bottom:10px}
.row{display:flex;justify-content:space-between;margin:8px 0}
.muted{color:#9ca3af}
.badge{padding:4px 8px;border-radius:8px;font-size:12px;font-weight:700}
.high{background:#dc2626}
.medium{background:#f59e0b}
.low{background:#16a34a}
.nav{position:fixed;left:0;right:0;bottom:0;background:#0b0f1a;border-top:1px solid #1f2937;display:flex;justify-content:space-around;padding:14px 0;font-weight:700}
.err{color:#ef4444;padding:20px}
.small{font-size:13px;color:#9ca3af}
</style>
</head>

<body>

<div id="app"></div>

<div class="nav">
  <div>DASHBOARD</div>
  <div>COURSES</div>
  <div>RENFO</div>
</div>

<script>

// ======================
// DEBUG SAFE (ANTI ÉCRAN BLANC)
// ======================
window.onerror=function(msg,url,line){
  document.body.innerHTML =
    '<div class="err">' +
    '<h2>ERREUR JS</h2>' +
    '<p>'+msg+'</p>' +
    '<p>Ligne: '+line+'</p>' +
    '</div>';
};

// ======================
// SAFE NUMBERS
// ======================
function num(v){
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
}

function fixed(v,d=2){
  const n = num(v);
  return n===null ? "--" : n.toFixed(d);
}

// ======================
// CALCULS
// ======================
function pace(d,t){
  d=num(d); t=num(t);
  if(!d || !t) return null;
  return t/d;
}

function fmtPace(sec){
  sec=num(sec);
  if(!sec) return "--";
  const m=Math.floor(sec/60);
  const s=Math.round(sec%60);
  return m+":"+String(s).padStart(2,"0")+"/km";
}

function sum(obj){
  return Object.values(obj||{}).reduce((a,b)=>a+(num(b)||0),0);
}

function zonesPct(z){
  const total=sum(z);
  if(!total) return null;

  const res={};
  for(let k in z){
    res[k]=(num(z[k])||0)/total100;
  }
  return res;
}

function intensity(z4){
  z4=num(z4);
  if(z4===null) return "LOW";
  if(z4>80) return "HIGH";
  if(z4>50) return "MEDIUM";
  return "LOW";
}

function cls(l){
  return l==="HIGH" ? "high" :
         l==="MEDIUM" ? "medium" :
         "low";
}

// ======================
// DATA (inchangée structure)
// ======================
const activities = [
  {
    name:"Trail du muguet",
    distance:12.03,
    time:4620,
    avgHR:175,
    elevation:488,
    hrZones:{z1:0,z2:0,z3:120,z4:4500,z5:0}
  },
  {
    name:"Afternoon Run",
    distance:6.7,
    time:2460,
    avgHR:143,
    elevation:8,
    hrZones:{z1:300,z2:1500,z3:600,z4:60,z5:0}
  }
];

// ======================
// RENDER
// ======================
function render(){

  const app = document.getElementById("app");

  let html =     <div class="title">Runner Data Pro</div>     <p class="small">Version stable anti-crash. Les données invalides n'arrêtent plus le rendu.</p>  ;

  activities.forEach(a=>{

    const p = pace(a.distance,a.time);
    const zones = zonesPct(a.hrZones);
    const z4 = zones ? zones.z4 : null;
    const level = intensity(z4);

    html +=       <div class="card">         <div class="title">${a.name}</div>          <div class="row">           <span>Distance</span>           <b>${fixed(a.distance)} km</b>         </div>          <div class="row">           <span>Allure</span>           <b>${fmtPace(p)}</b>         </div>          <div class="row">           <span>FC moyenne</span>           <b>${fixed(a.avgHR,0)} bpm</b>         </div>          <div class="row">           <span>D+</span>           <b>${fixed(a.elevation,0)} m</b>         </div>          <div class="row">           <span>Z4</span>           <b>${fixed(z4,1)}%</b>         </div>          <div class="row">           <span>Intensité</span>           <span class="badge ${cls(level)}">${level}</span>         </div>       </div>    ;
  });

  // GLOBAL
  const totalTime = activities.reduce((s,a)=>s+sum(a.hrZones),0);
  const z2Time = activities.reduce((s,a)=>s+(num(a.hrZones?.z2)||0),0);
  const z2Percent = totalTime ? z2Time/totalTime100 : 0;

  html +=     <div class="card">       <div class="title">Stats globales</div>       <div class="row">         <span>% Z2 global</span>         <b>${fixed(z2Percent,1)}%</b>       </div>     </div>  ;

  app.innerHTML = html;
}

render();

</script>

</body>
</html>
